<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            
            width:100px;
            height:100px;
             
            color: white;
          
        }
        .flex-item1{
            background-color: red;
            
        }
        .flex-item2{
            background-color: green;
        }
        .flex-item3{
            background-color: blue;
        }
        .container{
            display: flex;
            height: 400px;
            width:600px;
            justify-content: space-evenly;
            flex-direction: column;
            align-items: center;

            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="flex-item1">div1</div>
        <div class="flex-item2">div2</div>
        <div class="flex-item3">div3</div>
    </div>
</body>
</html>
