<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
   .box{
    width: 100px;
    height: 100px;
    background-color: red;

    animation: move 5s infinite;
}

@keyframes move{
    from{
       background-color: red;
    }
    to{
        background-color: blue;
    }
}
</style>
<body>
    <div class="box">
        this is div
    </div>
</body>
</html>
